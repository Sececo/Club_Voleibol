<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editar Deportista - Club de Voleibol</title>
  <link rel="stylesheet" href="styles/Formularios.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="container">
    <header>
      <h1>Editar Deportista</h1>
    </header>

    <main>
      <form id="formDeportista" class="formulario" autocomplete="off" novalidate>
        <!-- Datos no editables, solo lectura -->
        <section class="form-section">
          <h2>Datos del Deportista</h2>

          <div class="form-group">
            <label for="nombre">Nombres</label>
            <input type="text" id="nombre" name="nombre" readonly />
          </div>

          <div class="form-group">
            <label for="apellido">Apellidos</label>
            <input type="text" id="apellido" name="apellido" readonly />
          </div>

          <div class="form-group">
            <label for="usuario">Nombre de Usuario</label>
            <input type="text" id="usuario" name="usuario" readonly />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" readonly />
          </div>

          <div class="form-group">
            <label for="documento">Número de Documento</label>
            <input type="text" id="documento" name="documento" readonly />
          </div>

          <div class="form-group">
            <label for="fecha_nacimiento">Fecha de Nacimiento</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" readonly />
          </div>

          <div class="form-group">
            <label for="sexo">Sexo</label>
            <input type="text" id="sexo" name="sexo" readonly />
          </div>

          <!-- Campos editables -->
          <div class="form-group">
            <label for="telefono">Teléfono *</label>
            <input type="tel" id="telefono" name="telefono" required placeholder="+57 300 1234567" />
          </div>

          <div class="form-group">
            <label for="tipo_documento">Tipo de Documento *</label>
            <select id="tipo_documento" name="tipo_documento" required>
              <option value="" disabled selected>Seleccione</option>
              <option value="CC">Cédula de Ciudadanía</option>
              <option value="TI">Tarjeta de Identidad</option>
              <option value="CE">Cédula de Extranjería</option>
            </select>
          </div>

          <div class="form-group">
            <label for="email">Correo Electrónico *</label>
            <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com" />
          </div>

          <div class="form-group">
            <label for="categoria">Categoría *</label>
            <select id="categoria" name="categoria" required>
              <option value="" disabled selected>Seleccione</option>
              <option value="benjamin">Benjamín</option>
              <option value="mini">Mini</option>
              <option value="infantil">Infantil</option>
            </select>
          </div>
        </section>

        <section class="form-section">
          <h2>Representante Legal (si aplica)</h2>

          <div class="form-group">
            <label for="nombre_representante">Nombre</label>
            <input type="text" id="nombre_representante" name="nombre_representante" readonly />
          </div>

          <div class="form-group">
            <label for="fecha_nacimiento_representante">Fecha de Nacimiento</label>
            <input type="date" id="fecha_nacimiento_representante" name="fecha_nacimiento_representante" readonly />
          </div>

          <div class="form-group">
            <label for="sexo_representante">Sexo</label>
            <input type="text" id="sexo_representante" name="sexo_representante" readonly />
          </div>

          <!-- Campo editable solo para teléfono del representante -->
          <div class="form-group">
            <label for="telefono_representante">Teléfono</label>
            <input type="tel" id="telefono_representante" name="telefono_representante" placeholder="+57 300 1234567" />
          </div>

          <div class="form-group">
            <label for="tipo_documento_representante">Tipo de Documento</label>
            <input type="text" id="tipo_documento_representante" name="tipo_documento_representante" readonly />
          </div>

          <div class="form-group">
            <label for="documento_representante">Número de Documento</label>
            <input type="text" id="documento_representante" name="documento_representante" readonly />
          </div>
        </section>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Guardar Cambios</button>
          <button type="button" class="btn-secondary" onclick="window.location.href='gestion_deportistas.html'">Regresar</button>
        </div>
      </form>
    </main>

    <footer>
      &copy; 2025 Club Deportivo de Voleibol
    </footer>
  </div>

  <script src="scripts/editar.js"></script>
</body>
</html>
