<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Editar Deportista - Club de Voleibol</title>
  <link rel="stylesheet" href="styles/principal.css" />
  <link rel="stylesheet" href="styles/registrar_deportista.css" />
</head>
<body>

  <header>
    <h1>Editar Deportista</h1>
  </header>

  <main>
    <form class="formulario">

      <label for="id_deportista">ID del Deportista:</label>
      <input type="text" id="id_deportista" name="id_deportista" readonly />

      <label for="nombres">Nombres:</label>
      <input type="text" id="nombres" name="nombres" readonly />

      <label for="apellidos">Apellidos:</label>
      <input type="text" id="apellidos" name="apellidos" readonly />

      <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
      <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" readonly />

      <label for="sexo">Sexo:</label>
      <select id="sexo" name="sexo" disabled>
        <option value="">Seleccionar</option>
        <option value="masculino">Masculino</option>
        <option value="femenino">Femenino</option>
        <option value="otro">Otro</option>
      </select>

      <label for="telefono">Contacto Telefónico:</label>
      <input type="tel" id="telefono" name="telefono" />

      <label for="tipo_documento">Tipo de Documento:</label>
      <select id="tipo_documento" name="tipo_documento">
        <option value="">Seleccionar</option>
        <option value="CC">Cédula de Ciudadanía</option>
        <option value="TI">Tarjeta de Identidad</option>
        <option value="CE">Cédula de Extranjería</option>
      </select>

      <label for="documento">Número de Documento:</label>
      <input type="text" id="documento" name="documento" readonly />

      <label for="email">Correo Electrónico:</label>
      <input type="email" id="email" name="email" />

      <label for="categoria">Categoría:</label>
      <select id="categoria" name="categoria">
        <option value="">Seleccionar</option>
        <option value="benjamin">Benjamín</option>
        <option value="mini">Mini</option>
        <option value="infantil">Infantil</option>
      </select>

      <button type="submit" class="btn">Guardar Cambios</button>
      <button id="volver" class="btn" type="button" onclick="location.href='gestion_deportistas.html'">
        Volver
      </button>
    </form>
  </main>

  <footer>
    &copy; 2025 Club Deportivo de Voleibol - Todos los derechos reservados.
  </footer>

  <script src="scripts/editar.js"></script>
</body>
</html>
