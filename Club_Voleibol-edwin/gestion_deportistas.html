<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Deportistas - Club de Voleibol</title>
    <link rel="stylesheet" href="styles/gestion_deportistas.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <h1>Gestión de Deportistas</h1>
    </header>
    
    <main>
        <h2>Lista de Deportistas</h2>
        <div id="filtro-categorias"></div>
        <div id="lista-deportistas">
            <p id="mensaje-no-jugadores">No hay deportistas registrados.</p>
        </div>
        <!-- Botones de navegación -->
        <button onclick="location.href='deportistas.html'" class="boton-volver">Volver a la pagina anterior</button>
        <button onclick="window.location.href='inicio.html'" class="boton-volver">Volver al Menú Principal</button>
    </main>

    <footer>
        &copy; 2025 Club Deportivo de Voleibol - Todos los derechos reservados.
    </footer>

    <!-- Modal ventana para confirmar edición -->
    <div id="modal-editar" class="modal">
      <div class="modal-content">
        <p>¿Deseas editar este deportista?</p>
        <div class="modal-buttons">
          <button id="btn-aceptar" class="btn-aceptar">Aceptar</button>
          <button id="btn-cancelar" class="btn-cancelar">Cancelar</button>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="scripts/gestion_deportistas.js"></script>
</body>
</html>
